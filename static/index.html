<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#e6e8eb" id="themeColor" />
    <title data-i18n="app.title">Switchboard</title>
    <link rel="icon" href="/static/favicon.ico?v=a2385ee2" sizes="any" />
    <link rel="icon" href="/static/favicon.svg?v=a2385ee2" type="image/svg+xml" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png?v=a2385ee2" />
    <link rel="manifest" href="/static/manifest.webmanifest?v=a2385ee2" />
    <script>
      (() => {
        const saved = localStorage.getItem("textingTheme");
        const prefersDark = window.matchMedia?.("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = saved || (prefersDark ? "dark" : "light");
      })();
    </script>
    <link rel="stylesheet" href="/static/styles.css?v=b175af4a" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="rail conversation-rail">
        <header class="rail-header">
          <div>
            <h1 data-i18n="app.title">Switchboard</h1>
          </div>
          <div class="rail-actions">
            <button class="icon-button" id="settingsButton" title="Settings" aria-label="Settings" data-i18n-title="settings.title" data-i18n-aria-label="settings.title">⚙</button>
            <button class="icon-button theme-button" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">◐</button>
            <button class="icon-button" id="newConversationButton" title="New conversation" aria-label="New conversation" data-i18n-title="conversation.new" data-i18n-aria-label="conversation.new">+</button>
            <button class="icon-button mobile-panel-button" id="mobilePanelButton" title="Show sender identities and contacts" aria-label="Show sender identities and contacts" data-i18n-title="panel.show" data-i18n-aria-label="panel.show">☷</button>
          </div>
        </header>
        <div class="search-row">
          <div class="search-control">
            <input id="conversationSearch" type="search" placeholder="Search" autocomplete="off" data-i18n-placeholder="search.placeholder" />
            <button
              class="search-clear-button"
              id="conversationSearchClear"
              type="button"
              title="Clear search"
              aria-label="Clear search"
              data-i18n-title="search.clear"
              data-i18n-aria-label="search.clear"
              hidden
            >
              &times;
            </button>
          </div>
        </div>
        <div class="stat-strip" id="statStrip"></div>
        <div class="category-tabs" role="tablist" aria-label="Thread category" data-i18n-aria-label="category.aria">
          <button class="category-tab active" data-category="inbox" data-i18n="category.inbox">Inbox</button>
          <button class="category-tab" data-category="unread" data-i18n="category.unread">Unread</button>
          <button class="category-tab" data-category="hidden" data-i18n="category.hidden">Hidden</button>
        </div>
        <div class="pull-refresh-indicator" id="pullRefreshIndicator" aria-hidden="true"></div>
        <div class="conversation-list" id="conversationList"></div>
      </aside>

      <div
        class="column-resizer left-resizer"
        data-resizer="left"
        role="separator"
        aria-orientation="vertical"
        aria-label="Resize thread list"
        tabindex="0"
      ></div>

      <main class="thread-pane">
        <header class="thread-header">
          <button class="icon-button mobile-back-button" id="mobileBackButton" title="Back to conversations" aria-label="Back to conversations" data-i18n-title="conversation.back" data-i18n-aria-label="conversation.back">‹</button>
          <div class="thread-title-wrap">
            <p class="eyebrow" id="threadKind" data-i18n="thread.conversation" data-i18n-dynamic="true">Conversation</p>
            <h2 id="threadTitle" data-i18n="thread.select" data-i18n-dynamic="true">Select a thread</h2>
            <div class="participant-row">
              <div class="participant-line" id="participantLine"></div>
              <button class="name-contact-button" id="contactNameToggle" type="button" hidden data-i18n="contact.name">Name</button>
            </div>
            <form class="contact-name-form hidden" id="contactNameForm">
              <input id="contactNameInput" type="text" placeholder="Contact name" autocomplete="off" data-i18n-placeholder="contact.name_placeholder" />
              <button class="small-button" type="submit" data-i18n="common.save">Save</button>
              <button class="small-button" id="contactNameCancel" type="button" data-i18n="common.cancel">Cancel</button>
            </form>
          </div>
          <div class="thread-actions">
            <label class="sender-picker">
              <span data-i18n="composer.from">From</span>
              <select id="fromNumber"></select>
            </label>
            <div class="thread-action-row" role="group" aria-label="Conversation actions" data-i18n-aria-label="conversation.actions">
              <button class="small-button done-button" id="dealtButton" disabled data-i18n="conversation.read">Read</button>
              <button class="small-button panel-button" id="toggleDetailsButton" aria-pressed="false" data-i18n="panel.label">Panel</button>
              <button class="small-button archive-button danger-button" id="archiveButton" disabled title="Hide" aria-label="Hide">&times;</button>
            </div>
          </div>
        </header>

        <section class="recipient-bar" id="recipientBar">
          <div class="chips" id="recipientChips"></div>
          <div class="recipient-entry">
            <input
              id="recipientInput"
              type="text"
              placeholder="Add recipient"
              data-i18n-placeholder="recipient.add"
              autocomplete="off"
              autocapitalize="off"
              enterkeyhint="done"
              spellcheck="false"
              aria-autocomplete="list"
              aria-controls="recipientSuggestions"
              aria-expanded="false"
            />
            <div class="recipient-suggestions hidden" id="recipientSuggestions" role="listbox"></div>
          </div>
        </section>

        <section class="messages" id="messages" tabindex="0" aria-label="Messages" data-i18n-aria-label="messages.aria"></section>

        <footer class="composer">
          <div class="composer-input-row">
            <div class="composer-text-wrap">
              <textarea id="messageText" placeholder="Message" rows="2" data-i18n-placeholder="composer.message"></textarea>
              <input id="mediaUrls" type="hidden" autocomplete="off" />
              <label class="icon-button upload-button" for="mediaFiles" title="Upload media" aria-label="Upload media" data-i18n-title="composer.upload" data-i18n-aria-label="composer.upload">📎</label>
              <input id="mediaFiles" class="hidden-file-input" type="file" accept="image/*,video/*,audio/*,application/pdf" multiple />
              <div class="composer-meta">
                <span id="messageCounter">0/160</span>
              </div>
            </div>
            <div class="composer-tools">
              <button class="icon-button send-button" id="sendButton" title="Send" aria-label="Send" data-i18n-title="composer.send" data-i18n-aria-label="composer.send">➤</button>
            </div>
          </div>
          <div class="composer-error hidden" id="composerError" role="alert"></div>
          <div class="upload-list hidden" id="uploadList"></div>
        </footer>
      </main>

      <div
        class="column-resizer right-resizer"
        data-resizer="right"
        role="separator"
        aria-orientation="vertical"
        aria-label="Resize side panel"
        tabindex="0"
      ></div>

      <aside class="rail detail-rail">
        <header class="detail-mobile-header">
          <h2 data-i18n="panel.label">Panel</h2>
          <button
            class="icon-button"
            id="mobileDetailCloseButton"
            type="button"
            title="Close panel"
            aria-label="Close panel"
            data-i18n-title="panel.close"
            data-i18n-aria-label="panel.close"
          >
            ×
          </button>
        </header>
        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="identities" data-i18n="tabs.numbers">Numbers</button>
          <button class="tab" data-tab="contacts" data-i18n="tabs.contacts">Contacts</button>
        </div>

        <section class="panel-section active" id="identitiesPanel">
          <div class="panel-heading">
            <h3 data-i18n="identities.heading">Sender Identities</h3>
          </div>
          <div class="identity-list" id="identityList"></div>
        </section>

        <section class="panel-section" id="contactsPanel">
          <div class="panel-heading">
            <h3 data-i18n="tabs.contacts">Contacts</h3>
            <button class="small-button" id="syncContactsButton" data-i18n="contacts.sync">Sync</button>
          </div>
          <input id="contactSearch" type="search" placeholder="Find contact" autocomplete="off" data-i18n-placeholder="contacts.find" />
          <div class="contact-results" id="contactResults"></div>
        </section>
      </aside>
    </div>

    <div class="selection-toolbar hidden" id="selectionToolbar" role="toolbar" aria-label="Selection actions" data-i18n-aria-label="selection.actions">
      <span id="selectionCount" data-i18n="selection.count">0 selected</span>
      <button class="small-button" id="bulkReadButton" type="button" data-i18n="conversation.read">Read</button>
      <button class="small-button" id="bulkUnreadButton" type="button" data-i18n="conversation.unread">Unread</button>
      <button class="small-button danger-button" id="bulkHideButton" type="button" data-i18n="conversation.hide">Hide</button>
      <button class="icon-button" id="selectionCancelButton" type="button" title="Cancel selection" aria-label="Cancel selection" data-i18n-title="common.cancel" data-i18n-aria-label="common.cancel">×</button>
    </div>

    <div class="toast" id="toast" role="status"></div>
    <div class="contact-name-modal hidden" id="contactNameModal" role="dialog" aria-modal="true" aria-label="Rename" tabindex="-1" data-i18n-aria-label="contact.rename">
      <form class="contact-name-card" id="contactNameModalForm">
        <header class="contact-name-header">
          <h2 data-i18n="contact.rename">Rename</h2>
          <button class="icon-button" id="contactNameModalClose" type="button" aria-label="Cancel" data-i18n-aria-label="common.cancel">×</button>
        </header>
        <div class="contact-name-body">
          <input id="contactNameModalInput" type="text" placeholder="Contact name" autocomplete="off" data-i18n-placeholder="contact.name_placeholder" />
        </div>
        <footer class="contact-name-footer">
          <button class="small-button" id="contactNameModalCancel" type="button" data-i18n="common.cancel">Cancel</button>
          <button class="small-button done-button" type="submit" data-i18n="common.save">Save</button>
        </footer>
      </form>
    </div>
    <div class="schedule-modal hidden" id="scheduleModal" role="dialog" aria-modal="true" aria-label="Schedule send" tabindex="-1" data-i18n-aria-label="schedule.title">
      <form class="schedule-card" id="scheduleForm">
        <header class="schedule-header">
          <h2 data-i18n="schedule.title">Schedule send</h2>
          <button class="icon-button" id="scheduleClose" type="button" aria-label="Cancel" data-i18n-aria-label="common.cancel">×</button>
        </header>
        <div class="schedule-body">
          <label for="scheduleTime">
            <span data-i18n="schedule.send_at">Send at</span>
            <input id="scheduleTime" type="datetime-local" required />
          </label>
        </div>
        <footer class="schedule-footer">
          <button class="small-button" id="scheduleCancel" type="button" data-i18n="common.cancel">Cancel</button>
          <button class="small-button done-button" type="submit" data-i18n="schedule.queue">Queue</button>
        </footer>
      </form>
    </div>
    <div class="settings-modal hidden" id="settingsModal" role="dialog" aria-modal="true" aria-label="Settings" tabindex="-1" data-i18n-aria-label="settings.title">
      <form class="settings-card" id="settingsForm">
        <header class="settings-header">
          <div>
            <h2 data-i18n="settings.title">Settings</h2>
            <p data-i18n="settings.description">Changes are saved and written to .env when available.</p>
          </div>
          <button class="icon-button" id="settingsClose" type="button" aria-label="Close settings" data-i18n-aria-label="settings.close">×</button>
        </header>
        <div class="settings-body">
          <nav class="settings-nav" id="settingsNav" aria-label="Settings sections"></nav>
          <div class="settings-main">
            <section class="settings-section settings-security-section" id="securitySettings"></section>
            <div class="settings-sections" id="settingsSections"></div>
          </div>
        </div>
        <footer class="settings-footer">
          <button class="small-button settings-stats-button" id="statsButton" type="button" data-i18n="stats.title">Stats</button>
          <button class="small-button" id="databaseDownloadButton" type="button" data-i18n="settings.download_database">Download DB</button>
          <button class="small-button" id="logoutButton" type="button" data-i18n="settings.sign_out">Sign out</button>
          <button class="small-button" id="settingsCancel" type="button" data-i18n="common.cancel">Cancel</button>
          <button class="small-button done-button" type="submit" data-i18n="common.save">Save</button>
        </footer>
      </form>
    </div>
    <div class="stats-modal hidden" id="statsModal" role="dialog" aria-modal="true" aria-label="Stats" tabindex="-1" data-i18n-aria-label="stats.title">
      <section class="stats-card">
        <header class="settings-header">
          <div>
            <h2 data-i18n="stats.title">Stats</h2>
            <p data-i18n="stats.description">Message and conversation totals.</p>
          </div>
          <div class="stats-header-actions">
            <label class="stats-period-field">
              <span data-i18n="stats.period">Period</span>
              <select id="statsPeriod"></select>
            </label>
            <button class="icon-button" id="statsClose" type="button" aria-label="Close stats" data-i18n-aria-label="stats.close">×</button>
          </div>
        </header>
        <div class="stats-body" id="statsBody"></div>
      </section>
    </div>
    <div class="lightbox hidden" id="lightbox" role="dialog" aria-modal="true" aria-label="Image preview" tabindex="-1" data-i18n-aria-label="lightbox.preview">
      <button class="lightbox-close" id="lightboxClose" aria-label="Close image preview" data-i18n-aria-label="lightbox.close">×</button>
      <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous image" data-i18n-aria-label="lightbox.previous">‹</button>
      <img id="lightboxImage" alt="" />
      <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next image" data-i18n-aria-label="lightbox.next">›</button>
      <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>
    <div class="reaction-menu hidden" id="reactionMenu" role="menu" aria-label="Message reactions" data-i18n-aria-label="message.react"></div>
    <script src="/static/app.js?v=9b438619" type="module"></script>
  </body>
</html>
