plugins {
    id "com.android.application"
}

def localProps = new Properties()
def localPropsFile = rootProject.file("local.properties")
if (localPropsFile.exists()) {
    localPropsFile.withInputStream { localProps.load(it) }
}
def switchboardAppUrl = localProps.getProperty(
    "SWITCHBOARD_APP_URL",
    localProps.getProperty("TEXTING_APP_URL", "https://switchboard.example.com")
)

android {
    namespace "com.example.texting"
    compileSdk 35

    defaultConfig {
        applicationId "com.example.texting"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "0.1.0"
        resValue "string", "app_url", switchboardAppUrl
    }
}

dependencies {
    implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.1.0"
}
